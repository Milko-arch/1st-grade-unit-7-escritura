<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguoKids: The Word Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bubblegum+Sans&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-color: #6366f1;
            --s-color: #f43f5e;
            --bg-color: #f5f3ff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="%23f59e0b" stroke="white" stroke-width="1.5" d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7.4-6.3-4.8-6.3 4.8 2.3-7.4-6-4.6h7.6z"/></svg>') 16 16, auto;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(99, 102, 241, 0.05) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: -2;
            pointer-events: none;
        }

        button, .cursor-pointer {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="%23ec4899" stroke="white" stroke-width="1.5" d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7.4-6.3-4.8-6.3 4.8 2.3-7.4-6-4.6h7.6z"/></svg>') 16 16, pointer !important;
        }

        .font-game { font-family: 'Bubblegum Sans', cursive; }
        .font-bold-game { font-family: 'Fredoka One', cursive; }

        .btn-bounce {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }
        .btn-bounce:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            border-radius: 40px;
        }

        .cursor-pointer.glass:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15), inset 0 0 15px rgba(255,255,255,0.8);
        }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }

        .map-path {
            stroke-dasharray: 10;
            animation: dash 5s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -100; } }

        .robot-container img {
            animation: robotBlink 4s infinite;
        }

        @keyframes robotBlink {
            0%, 45%, 55%, 100% { clip-path: inset(0 0 0 0); }
            50% { clip-path: inset(25% 0 25% 0); } 
        }

        .is-talking img {
            animation: mouthMove 0.25s infinite alternate ease-in-out;
        }

        @keyframes mouthMove {
            from { transform: scaleY(1); }
            to { transform: scaleY(0.9); } 
        }

        .robot-default-pos {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
        }

        .robot-spelling-pos {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            transform: none !important;
            margin: 20px auto 0 auto;
            z-index: 10;
        }

        #writing-canvas {
            background: #1e293b;
            border: 8px solid #475569;
            border-radius: 20px;
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            max-width: 500px;
            height: 300px;
        }

        .guide-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* AGRANDADO: DE 80PX A 140PX */
            font-size: 140px;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: 8px;
            pointer-events: none;
            user-select: none;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .github-link {
            transition: all 0.3s ease;
        }
        .github-link:hover {
            color: #6366f1;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HUD -->
    <div class="fixed top-0 left-0 right-0 p-4 z-50 flex justify-between items-start pointer-events-none">
        <div class="flex flex-col gap-2 pointer-events-auto">
            <div class="glass px-6 py-2 flex items-center gap-3 shadow-xl">
                <span class="text-3xl">💎</span>
                <span id="stars-count" class="text-2xl font-bold-game text-indigo-600">0</span>
            </div>
        </div>

        <div class="flex flex-col items-end gap-2 pointer-events-auto">
            <button onclick="showSection('map')" class="glass p-4 btn-bounce bg-white">
                <span class="text-2xl">🏠</span>
            </button>
        </div>
    </div>

    <!-- ROBOT LEO -->
    <div id="mission-toast" class="robot-default-pos animate__animated animate__fadeInUp flex flex-col items-center gap-2 pointer-events-none">
        <p class="bg-white/90 px-4 py-2 rounded-2xl border-2 border-indigo-200 text-xs font-bold text-indigo-800 uppercase shadow-lg text-center max-w-[200px]" id="leo-talk">Hello! Let's play!</p>
        <div id="leo-avatar-container" class="w-20 h-20 bg-white/90 rounded-full border-4 border-white flex items-center justify-center overflow-hidden shadow-2xl robot-container pointer-events-auto">
            <img id="hud-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Leo" class="w-full h-full transition-transform duration-200" alt="Avatar">
        </div>
    </div>

    <!-- NEXT MISSION MODAL -->
    <div id="next-mission-modal" class="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 hidden">
        <div class="glass max-w-md w-full p-8 text-center animate__animated animate__bounceIn">
            <div class="text-6xl mb-4">🌟</div>
            <h3 class="text-3xl font-bold-game text-indigo-600 mb-2">EXCELLENT WORK!</h3>
            <p class="text-slate-600 mb-8 font-medium">You reviewed all the words!</p>
            <div class="flex flex-col gap-4">
                <button onclick="startMission('writing')" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold-game text-lg btn-bounce flex items-center justify-center gap-2">
                    <span>📋</span> WRITING (Board)
                </button>
                <button onclick="goToSpellingFromModal()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold-game text-lg btn-bounce">GO TO MISSION 2 🕵️</button>
                <button onclick="handleContinueHere()" class="w-full py-4 bg-slate-200 text-slate-700 rounded-2xl font-bold-game text-lg btn-bounce">STAY HERE</button>
            </div>
        </div>
    </div>

    <!-- NAME MODAL -->
    <div id="name-modal" class="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 hidden">
        <div class="glass max-w-md w-full p-8 text-center animate__animated animate__zoomIn">
            <h3 class="text-3xl font-bold-game text-indigo-600 mb-4">WELCOME HERO!</h3>
            <p class="text-slate-600 mb-6 font-medium">Write your name to start:</p>
            <input type="text" id="student-name" placeholder="Your name..." class="w-full p-4 rounded-2xl border-4 border-indigo-100 focus:border-indigo-400 outline-none text-xl text-center font-bold mb-6">
            <button onclick="confirmNameAndStart()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold-game text-xl btn-bounce">START! 🚀</button>
        </div>
    </div>

    <!-- ONBOARDING -->
    <div id="onboarding" class="fixed inset-0 z-[100] bg-gradient-to-br from-yellow-300 via-yellow-400 to-yellow-500 flex flex-col items-center justify-center p-6 text-indigo-900 overflow-y-auto">
        <div class="max-w-xl w-full text-center py-10 flex-grow flex flex-col justify-center">
            <div class="mb-4 animate__animated animate__fadeInDown">
                <h1 class="text-7xl font-bold-game tracking-wider drop-shadow-2xl text-indigo-900">FOOTPRINTS</h1>
                <p class="text-3xl font-game text-indigo-800 mt-2 uppercase tracking-widest">UNIT 7 FIRST GRADE</p>
            </div>
            
            <div class="w-24 h-1 bg-indigo-900/30 mx-auto my-8 rounded-full"></div>

            <h2 class="text-4xl font-game mb-8 animate__animated animate__fadeIn text-indigo-900">CHOOSE YOUR HERO!</h2>
            <div class="grid grid-cols-2 gap-6 mb-12">
                <div onclick="selectPower('blue', 'Leo')" class="glass p-6 cursor-pointer hover:scale-105 transition-all group">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Leo" class="w-32 h-32 mx-auto group-hover:rotate-12 transition-transform">
                    <p class="mt-4 font-bold-game text-indigo-600 uppercase">Blue Bolt</p>
                </div>
                <div onclick="selectPower('pink', 'Mia')" class="glass p-6 cursor-pointer hover:scale-105 transition-all group">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Mia" class="w-32 h-32 mx-auto group-hover:-rotate-12 transition-transform">
                    <p class="mt-4 font-bold-game text-pink-600 uppercase">Pink Fire</p>
                </div>
            </div>
        </div>
    </div>

    <main id="game-container" class="flex-grow pt-24 pb-32 px-4 transition-all duration-500 opacity-0 flex flex-col">
        
        <!-- MISSION MAP -->
        <section id="map-section" class="max-w-md mx-auto relative h-[70vh] w-full flex flex-col items-center justify-around">
            <div class="absolute inset-0 flex justify-center -z-10">
                <svg width="100" height="100%" class="opacity-20">
                    <line x1="50" y1="0" x2="50" y2="100%" stroke="indigo" stroke-width="8" stroke-dasharray="15" class="map-path" />
                </svg>
            </div>

            <button onclick="startMission('learn')" class="relative group animate__animated animate__pulse animate__infinite">
                <div class="w-24 h-24 rounded-full bg-white border-8 border-indigo-400 flex items-center justify-center text-4xl shadow-2xl group-hover:scale-110 transition-transform">🏝️</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Mission 1</div>
            </button>

            <button id="node-writing" onclick="startMission('writing')" class="relative group opacity-50 grayscale pointer-events-none">
                <div class="w-24 h-24 rounded-full bg-white border-8 border-emerald-400 flex items-center justify-center text-4xl shadow-2xl group-hover:scale-110 transition-transform">📋</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Writing</div>
            </button>

            <button id="node-spelling" onclick="startMission('spelling')" class="relative group opacity-50 grayscale pointer-events-none">
                <div class="w-24 h-24 rounded-full bg-white border-8 border-pink-400 flex items-center justify-center text-4xl shadow-2xl group-hover:scale-110 transition-transform">🕵️</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-pink-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Mission 2</div>
            </button>

            <button id="node-quiz" onclick="startMission('quiz')" class="relative group opacity-50 grayscale pointer-events-none">
                <div class="w-32 h-32 rounded-[40px] bg-gradient-to-tr from-yellow-400 to-orange-500 border-8 border-white flex items-center justify-center text-6xl shadow-2xl group-hover:scale-110 transition-transform">🏰</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Final Castle</div>
            </button>
        </section>

        <!-- MISSION 1: LEARN -->
        <section id="learn-section" class="hidden w-full">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 max-w-6xl mx-auto" id="learn-grid"></div>
        </section>

        <!-- WRITING MISSION -->
        <section id="writing-section" class="hidden max-w-2xl mx-auto w-full">
            <div class="glass p-8 text-center relative overflow-hidden">
                <h3 class="text-2xl font-bold-game text-indigo-600 mb-4 uppercase">Mission: Digital Board</h3>
                <div id="writing-target-icon" class="text-7xl mb-2">❓</div>
                <p id="writing-prompt" class="text-slate-500 font-bold mb-6">Trace the word over the gray guide!</p>
                
                <div class="relative inline-block w-full">
                    <div id="canvas-guide-text" class="guide-text"></div>
                    <canvas id="writing-canvas" class="mx-auto shadow-2xl"></canvas>
                    <div class="absolute top-4 right-4 flex flex-col gap-2">
                        <button onclick="clearCanvas()" class="w-12 h-12 bg-white/40 hover:bg-white/60 text-indigo-900 rounded-full flex items-center justify-center text-xl transition-colors shadow-md">🗑️</button>
                        <button onclick="playWritingWord()" class="w-12 h-12 bg-white/40 hover:bg-white/60 text-indigo-900 rounded-full flex items-center justify-center text-xl transition-colors shadow-md">🔊</button>
                    </div>
                </div>

                <div class="mt-8 flex gap-4 justify-center">
                    <button id="check-writing-btn" onclick="validateStroke()" class="px-10 py-4 bg-emerald-500 text-white rounded-2xl font-bold-game text-xl btn-bounce shadow-lg flex items-center gap-3">
                        <span id="btn-text">CHECK TRACE</span>
                    </button>
                </div>
                
                <div id="writing-feedback" class="mt-4 min-h-[24px] font-bold text-lg"></div>
            </div>
        </section>

        <!-- MISSION 2: SPELLING -->
        <section id="spelling-section" class="hidden max-w-2xl mx-auto w-full">
            <div class="glass p-10 text-center relative overflow-hidden">
                <div class="flex items-center justify-center gap-4 mb-4">
                    <div id="spelling-icon" class="text-9xl animate__animated animate__bounceIn">❓</div>
                    <button onclick="playCurrentSpellingWord()" class="w-16 h-16 bg-white border-4 border-indigo-400 rounded-full flex items-center justify-center text-2xl shadow-lg btn-bounce">🔊</button>
                </div>
                <div id="spelling-slots" class="flex justify-center flex-wrap gap-4 mb-12 min-h-[100px]"></div>
                <div id="spelling-letters" class="flex flex-wrap justify-center gap-4"></div>
                <div id="robot-anchor-spelling"></div>
            </div>
        </section>

        <!-- FINAL MISSION: QUIZ -->
        <section id="quiz-section" class="hidden max-w-2xl mx-auto w-full">
            <div id="quiz-card" class="glass p-12 text-center shadow-2xl relative min-h-[500px] flex flex-col justify-center"></div>
        </section>

    </main>

    <footer id="main-footer" class="w-full py-6 text-center text-indigo-900 font-medium text-sm opacity-80 flex flex-col items-center gap-2">
        <div class="flex items-center gap-4">
            <span>© 2024 Ing. Milko Gonzales C</span>
            <a href="https://github.com/milkogonzales" target="_blank" class="github-link flex items-center gap-1 font-bold">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub Repo
            </a>
        </div>
    </footer>

    <script>
        const originalVocabulary = [
            { word: 'UP', icon: '⬆️' }, { word: 'US', icon: '👨‍👩‍👧‍👦' }, { word: 'BUT', icon: '🤔' },
            { word: 'FUN', icon: '🎡' }, { word: 'CUT', icon: '✂️' }, { word: 'RUN', icon: '🏃' },
            { word: 'ARE', icon: '🤝' }, { word: 'ONE', icon: '1️⃣' }, { word: 'ALL', icon: '🌎' },
            { word: 'SPUN', icon: '🌪️' }, { word: 'SUN', icon: '☀️' }, { word: 'BUN', icon: '🥯' },
            { word: 'HUT', icon: '🛖' }, { word: 'SHUT', icon: '🚪' }, { word: 'NUT', icon: '🥜' }
        ];

        let state = {
            stars: 0,
            userPower: 'blue',
            heroName: 'Leo',
            studentName: '',
            currentSection: 'map',
            spellingIdx: 0,
            quizIdx: 0,
            writingIdx: 0,
            unlockedLevels: ['learn'],
            learnedWords: new Set()
        };

        // --- CALIBRATED WRITING VALIDATION ---
        let canvas, ctx, isDrawing = false;
        let points = [];

        function initCanvas() {
            canvas = document.getElementById('writing-canvas');
            if (!canvas) return;
            canvas.width = 500;
            canvas.height = 300;
            ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 18; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { 
                    x: (clientX - rect.left) * scaleX, 
                    y: (clientY - rect.top) * scaleY 
                };
            };

            const start = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); points.push(p); e.preventDefault(); };
            const move = (e) => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); points.push(p); e.preventDefault(); };
            const stop = () => { isDrawing = false; };

            canvas.onmousedown = start; canvas.onmousemove = move; window.addEventListener('mouseup', stop);
            canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = stop;
        }

        function validateStroke() {
            const feedback = document.getElementById('writing-feedback');
            const targetWord = originalVocabulary[state.writingIdx].word;
            
            if (points.length < 15) {
                feedback.innerText = "Write the complete word!";
                feedback.className = "mt-4 font-bold text-lg text-orange-500 animate__animated animate__shakeX";
                return;
            }

            const gridSize = 8;
            const userGrid = new Set();
            points.forEach(p => {
                for(let dx=-1; dx<=1; dx++) {
                    for(let dy=-1; dy<=1; dy++) {
                        userGrid.add(`${Math.floor((p.x + dx*4) / gridSize)},${Math.floor((p.y + dy*4) / gridSize)}`);
                    }
                }
            });

            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = 500; hiddenCanvas.height = 300;
            const hCtx = hiddenCanvas.getContext('2d');
            
            // AJUSTADO: FUENTE MÁS GRANDE EN LA MÁSCARA (140PX) PARA COINCIDIR CON LA GUÍA
            hCtx.font = "900 140px Outfit";
            hCtx.textAlign = "center";
            hCtx.textBaseline = "middle";
            hCtx.letterSpacing = "8px";
            hCtx.fillText(targetWord, 250, 150);

            const imgData = hCtx.getImageData(0, 0, 500, 300).data;
            const targetCells = new Set();
            for (let y = 0; y < 300; y += gridSize) {
                for (let x = 0; x < 500; x += gridSize) {
                    let hasPixel = false;
                    for (let sy = 0; sy < gridSize; sy++) {
                        for (let sx = 0; sx < gridSize; sx++) {
                            const idx = ((y + sy) * 500 + (x + sx)) * 4 + 3;
                            if (imgData[idx] > 50) { hasPixel = true; break; }
                        }
                        if (hasPixel) break;
                    }
                    if (hasPixel) targetCells.add(`${x / gridSize},${y / gridSize}`);
                }
            }

            let hits = 0;
            targetCells.forEach(cell => { if (userGrid.has(cell)) hits++; });
            const coverage = hits / targetCells.size;

            let errors = 0;
            userGrid.forEach(cell => { if (!targetCells.has(cell)) errors++; });
            const errorRate = errors / userGrid.size;

            // MANTENIENDO CALIBRACIÓN BALANCEADA
            if (coverage > 0.45 && errorRate < 0.65) {
                feedback.innerText = "🌟 AMAZING! 🌟";
                feedback.className = "mt-4 font-bold text-xl text-emerald-500 animate__animated animate__tada";
                updateStars(5);
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => {
                    state.writingIdx++;
                    if (state.writingIdx < originalVocabulary.length) setupWritingLevel();
                    else { unlockNext('spelling'); startMission('map'); }
                }, 1500);
            } else {
                feedback.innerText = coverage < 0.45 ? "Trace over all letters!" : "Try to follow the lines better!";
                feedback.className = "mt-4 font-bold text-lg text-amber-500 animate__animated animate__shakeX";
            }
        }

        function clearCanvas() {
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
            points = [];
            document.getElementById('writing-feedback').innerText = "";
        }

        function setupWritingLevel() {
            clearCanvas();
            const current = originalVocabulary[state.writingIdx];
            document.getElementById('writing-target-icon').innerText = current.icon;
            document.getElementById('writing-prompt').innerText = `Write the word: ${current.word}`;
            document.getElementById('canvas-guide-text').innerText = current.word;
            playWord(current.word);
        }

        // --- CORE SYSTEM ---
        function playWord(word) {
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(word.toLowerCase());
            utter.lang = 'en-US';
            utter.rate = 0.7;
            const container = document.getElementById('leo-avatar-container');
            utter.onstart = () => container.classList.add('is-talking');
            utter.onend = () => container.classList.remove('is-talking');
            speechSynthesis.speak(utter);
        }

        function updateStars(n) {
            state.stars += n;
            document.getElementById('stars-count').innerText = state.stars;
        }

        function updateSpeech(text) {
            document.getElementById('leo-talk').innerText = text;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            speechSynthesis.speak(utter);
        }

        function startMission(id) {
            document.getElementById('next-mission-modal').classList.add('hidden');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${id}-section`).classList.remove('hidden');
            state.currentSection = id;
            const robot = document.getElementById('mission-toast');
            if (id === 'writing') { setTimeout(initCanvas, 100); state.writingIdx = 0; setupWritingLevel(); }
            if (id === 'map') { document.body.appendChild(robot); robot.className = 'robot-default-pos animate__animated animate__fadeInUp flex flex-col items-center gap-2'; } 
            else if (id === 'learn') renderLearn();
            else if (id === 'spelling') { document.getElementById('robot-anchor-spelling').appendChild(robot); robot.className = 'robot-spelling-pos flex flex-col items-center gap-2'; state.spellingIdx = 0; renderSpelling(); }
            else if (id === 'quiz') { state.quizIdx = 0; renderQuiz(); }
        }

        function unlockNext(id) {
            if(!state.unlockedLevels.includes(id)) {
                state.unlockedLevels.push(id);
                const node = document.getElementById(`node-${id}`);
                if (node) node.classList.remove('opacity-50', 'grayscale', 'pointer-events-none');
            }
        }

        function selectPower(color, name) {
            state.userPower = color; state.heroName = name;
            document.getElementById('hud-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${name}`;
            document.getElementById('name-modal').classList.remove('hidden');
        }

        function confirmNameAndStart() {
            state.studentName = document.getElementById('student-name').value || "Hero";
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('name-modal').classList.add('hidden');
            document.getElementById('game-container').classList.remove('opacity-0');
            updateSpeech(`Hello ${state.studentName}! Let's start!`);
        }

        function renderLearn() {
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = originalVocabulary.map((v, i) => `
                <div onclick="learnClick(this, '${v.word}')" class="glass p-6 cursor-pointer btn-bounce flex flex-col items-center relative">
                    <div class="word-check absolute top-4 right-4 w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-white text-[10px] scale-0">✓</div>
                    <span class="text-5xl">${v.icon}</span>
                    <span class="mt-4 font-bold-game text-xl text-indigo-600 uppercase">${v.word}</span>
                </div>
            `).join('');
        }

        function learnClick(el, word) {
            playWord(word);
            if (!state.learnedWords.has(word)) {
                el.querySelector('.word-check').classList.remove('scale-0');
                el.querySelector('.word-check').classList.add('scale-100');
                state.learnedWords.add(word);
                updateStars(1);
            }
            if (state.learnedWords.size === originalVocabulary.length) {
                unlockNext('writing');
                document.getElementById('next-mission-modal').classList.remove('hidden');
            }
        }

        function handleContinueHere() { document.getElementById('next-mission-modal').classList.add('hidden'); }
        function goToSpellingFromModal() { document.getElementById('next-mission-modal').classList.add('hidden'); startMission('spelling'); }
        function showSection(id) { startMission(id); }

        function renderSpelling() {
            if (state.spellingIdx >= originalVocabulary.length) { unlockNext('quiz'); startMission('map'); return; }
            const current = originalVocabulary[state.spellingIdx];
            document.getElementById('spelling-icon').innerText = current.icon;
            document.getElementById('spelling-slots').innerHTML = current.word.split('').map(() => `<div class="w-14 h-16 border-4 border-dashed border-slate-300 rounded-2xl flex items-center justify-center text-3xl font-bold-game bg-white"></div>`).join('');
            const letters = current.word.split('').sort(() => Math.random() - 0.5);
            document.getElementById('spelling-letters').innerHTML = letters.map(l => `<button onclick="checkLetter('${l}', this)" class="w-14 h-14 glass font-bold-game text-2xl btn-bounce uppercase">${l}</button>`).join('');
            playWord(current.word);
        }

        function playWritingWord() { if (originalVocabulary[state.writingIdx]) playWord(originalVocabulary[state.writingIdx].word); }
        function playCurrentSpellingWord() { if (originalVocabulary[state.spellingIdx]) playWord(originalVocabulary[state.spellingIdx].word); }

        function checkLetter(l, btn) {
            const word = originalVocabulary[state.spellingIdx].word;
            const slots = document.getElementById('spelling-slots').children;
            const next = Array.from(slots).findIndex(s => s.innerText === "");
            if(word[next] === l) {
                slots[next].innerText = l;
                btn.style.opacity = "0"; btn.disabled = true;
                if(Array.from(slots).every(s => s.innerText !== "")) {
                    state.spellingIdx++;
                    setTimeout(renderSpelling, 1500);
                }
            } else {
                btn.classList.add('animate__shakeX', 'bg-red-100');
                setTimeout(() => btn.classList.remove('animate__shakeX', 'bg-red-100'), 500);
            }
        }

        function renderQuiz() {
            const card = document.getElementById('quiz-card');
            if(state.quizIdx >= originalVocabulary.length) { 
                card.innerHTML = `<h2 class="text-4xl font-bold-game uppercase">Mission Completed!</h2><p class="mt-4">You are a word master!</p>`; 
                confetti({ particleCount: 150, spread: 100 });
                return; 
            }
            const current = originalVocabulary[state.quizIdx];
            const options = [current.word, ...originalVocabulary.filter(v => v.word !== current.word).slice(0,3).map(v => v.word)].sort(() => Math.random() - 0.5);
            card.innerHTML = `
                <div class="text-9xl mb-8">${current.icon}</div>
                <div class="grid grid-cols-2 gap-4">
                    ${options.map(opt => `<button onclick="handleQuizAnswer('${opt}', '${current.word}')" class="glass p-6 text-2xl font-bold-game uppercase hover:bg-indigo-50 transition-colors">${opt}</button>`).join('')}
                </div>`;
            playWord(current.word);
        }

        function handleQuizAnswer(selected, correct) {
            if(selected === correct) { state.quizIdx++; updateStars(2); renderQuiz(); }
            else if(navigator.vibrate) navigator.vibrate(200);
        }
    </script>
</body>
</html>
